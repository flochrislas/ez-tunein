name: ez_tunein
description: Minimalist internet radio player that saves song titles and records audio.
publish_to: 'none'
version: 0.11.0+15

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Playback (Android/iOS use native; desktop uses the media_kit backend below)
  just_audio: ^0.9.42
  # Desktop (Windows/Linux/macOS) playback backend for just_audio, wraps libmpv
  just_audio_media_kit: ^2.0.6
  media_kit_libs_audio: ^1.0.5
  # Where to write the saved-tracks CSV
  path_provider: ^2.1.5
  # Persists the volume setting between launches
  shared_preferences: ^2.3.2
  # Desktop (Windows/Linux/macOS) window sizing + persistence
  window_manager: ^0.4.3
  # Share the saved-tracks CSV via the OS share sheet (mobile: email/Drive/etc.)
  # Pinned to ^12 so its win32 constraint stays compatible with file_picker.
  share_plus: ^12.0.0
  # Native open/save dialogs for import/export of the radio station list
  file_picker: ^8.1.0
  # True Android media session: rich media notification, lock-screen controls,
  # Bluetooth/headset/car (AVRCP), and a mediaPlayback foreground service that
  # keeps playback + the recording/metadata socket alive with the screen off.
  # Replaces flutter_foreground_task. One AudioHandler drives BOTH players
  # (radio + recordings) — the reason just_audio_background couldn't be used.
  audio_service: ^0.18.18
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Generates native launcher icons for Android/macOS/Windows from a single
  # source image. Run after changing assets/icon/: `dart run flutter_launcher_icons`.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  # Bundled so the Linux GTK runner can set the window/taskbar icon at runtime
  # (flutter_launcher_icons doesn't cover Linux). See linux/runner/my_application.cc.
  assets:
    - assets/icon/app_icon_256.png

# App launcher icons. Regenerate with: dart run flutter_launcher_icons
# Source art lives in assets/icon/. Linux is handled natively (see above).
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256
